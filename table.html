<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テーブル | タスク管理</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .table-header-back {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
      font-family: inherit;
      display: inline-block;
    }
    .table-header-back:hover { background: var(--border); }

    .table-total {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .dish-table-name {
      font-size: 1rem;
      font-weight: 700;
      color: #78350f;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .table-empty-state {
      text-align: center;
      color: rgba(253,230,138,.55);
      font-size: 0.95rem;
      line-height: 2.4;
      padding: 80px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>🍽️ テーブル</h1>
    <div class="header-right">
      <span class="table-total" id="dish-total"></span>
      <a href="index.html" class="table-header-back">← ボードへ戻る</a>
    </div>
  </header>

  <main class="table-view">
    <div class="table-scene">
      <div id="table-dishes" class="table-dishes"></div>
      <p id="table-empty-state" class="table-empty-state" style="display:none">
        まだ料理がありません。<br>タスクを完了して食材をお鍋に入れよう！
      </p>
    </div>
  </main>

  <script>
    let table = [];
    try { table = JSON.parse(localStorage.getItem("table_v1")) || []; }
    catch { table = []; }

    function formatDate(s) {
      if (!s) return "—";
      const d = new Date(s + "T00:00:00");
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
    }

    const container = document.getElementById("table-dishes");
    const emptyEl   = document.getElementById("table-empty-state");
    const totalEl   = document.getElementById("dish-total");

    totalEl.textContent = `完成した料理: ${table.length}品`;

    if (table.length === 0) {
      emptyEl.style.display = "block";
    } else {
      table.forEach((dish, idx) => {
        const card = document.createElement("div");
        card.className = "dish-table-card";
        card.style.animationDelay = `${idx * 0.07}s`;
        card.innerHTML = `
          <span class="dish-table-emoji">${dish.dishEmoji}</span>
          <div class="dish-table-name">${dish.dishName || ("料理 #" + (idx + 1))}</div>
          <div class="dish-table-ings">${dish.ingredients.join("")}</div>
          <div class="dish-table-date">${formatDate(dish.cookedAt.slice(0, 10))}</div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
